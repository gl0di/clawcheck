name: Publish to ClawHub

# Publishes the skill to ClawHub:
#   - automatically when a release tag (vX.Y.Z) is pushed, and
#   - manually via the "Run workflow" button (workflow_dispatch).
# Auth uses the CLAWHUB_TOKEN repo secret â€” no local login needed.
# One-time setup (done): create a clh_ token at https://clawhub.ai/dashboard and add it
# as a repo secret named CLAWHUB_TOKEN (Settings -> Secrets and variables -> Actions).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (blank = use SKILL.md frontmatter version)"
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    # Manual-approval gate: configure required reviewers under
    # repo Settings â†’ Environments â†’ "release" for this gate to actually block.
    environment: release
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install ClawHub CLI
        # Pinned to exact version to prevent supply-chain risk from a compromised
        # or typosquatted release executing with the CLAWHUB_TOKEN release secret.
        run: npm i -g clawhub@0.22.0

      - name: Resolve & verify version
        id: ver
        run: |
          FM="$(grep -m1 '^version:' SKILL.md | awk '{print $2}')"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"
          else
            VER="$FM"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "resolved version=$VER  (SKILL.md frontmatter=$FM)"
          if [ "$VER" != "$FM" ]; then
            echo "::error::Version '$VER' does not match SKILL.md frontmatter '$FM' â€” bump SKILL.md first."
            exit 1
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Smoke gate â€” lint, tests, compile
        run: |
          python -m pip install -U pytest ruff
          python -m pytest -q
          ruff check .
          python -m compileall clawseccheck

      - name: Log in to ClawHub
        # Token is passed only via env â€” never echoed or printed.
        run: clawhub login --token "$CLAWHUB_TOKEN"
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

      - name: Publish skill
        run: >
          clawhub publish .
          --slug clawseccheck
          --owner gl0di
          --version "${{ steps.ver.outputs.version }}"
          --changelog "Release ${{ steps.ver.outputs.version }} (${{ github.sha }})"
